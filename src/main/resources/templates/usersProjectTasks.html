<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="'Tasks | ' + ${project.name}">Tasks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <link href="/css/sidebar.css" rel="stylesheet">
</head>
<style>
	.avatar-circle{
	  width:32px;
	  height:32px;
	  border-radius:50%;
	  background:#0d6efd;
	  color:white;
	  font-size:13px;
	  font-weight:600;
	  display:flex;
	  align-items:center;
	  justify-content:center;
	}
</style>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/commonNavbar}"></div>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
	<div th:replace="~{fragments/commonSidebar}"></div>

    <!-- Main Content -->
    <main id="mainContent" class="col-lg-10 ms-auto p-4" style="background: #f0f2f5; min-height: 100vh;">
		<div class="d-flex justify-content-between align-items-center mb-3">
		  <h2 class="text-primary fw-bold"
		      th:text="${project.name} + ' - Tasks'">Project Tasks</h2>

			  <button class="btn btn-primary"
			          onclick="openCreatePanel()">
			    + Create
			  </button>
		</div>

        <!-- TASK LIST -->
		<table class="task-table table table-bordered table-hover">
		  <thead class="table-dark">
		    <tr>
		      <th>#</th>
		      <th>Title</th>
		      <th>Assignee</th>
		      <!--<th>Due Date</th>-->
		      <th>Status</th>
		      <th>Type</th>
		      <th>Actions</th>
		    </tr>
		  </thead>
		  <tbody>
		    <tr th:each="task : ${taskList}">
				<td>
				  <a class="fw-semibold text-primary" 
				  th:href="@{/projects/{projectId}/tasks/details/{taskId}(projectId=${project.id},taskId=${task.id})}"
				        th:text="${project.alias + '-' + task.id}">
				  </a>
				</td>
				<td>
				  <!-- VIEW MODE -->
				  <span th:id="'title-view-' + ${task.id}"
				        style="cursor:pointer;"
				        th:text="${task.title}"
				        th:onclick="'enableTitleEdit(' + ${task.id} + ')'">
				  </span>

				  <!-- EDIT MODE -->
				  <input type="text"
				         th:id="'title-edit-' + ${task.id}"
				         class="form-control form-control-sm d-none"
				         th:value="${task.title}"
				         th:onblur="'updateTitle(' + ${task.id} + ')'"
				         th:onkeydown="'handleTitleKey(event,' + ${task.id} + ')'">

				</td>			  
			  <td>
			    <!-- VIEW MODE -->
			    <div th:id="'assignee-view-' + ${task.id}"
			         class="d-flex align-items-center gap-2"
			         style="cursor:pointer;"
			         th:onclick="'enableAssigneeEdit(' + ${task.id} + ')'">

			      <div class="avatar-circle"
			           th:if="${task.assignee != null}"
			           th:text="${#strings.substring(task.assignee.firstName,0,1) + #strings.substring(task.assignee.lastName,0,1)}">
			      </div>

			      <span th:text="${task.assignee != null ? task.assignee.firstName + ' ' + task.assignee.lastName : 'Unassigned'}"></span>

			    </div>

			    <!-- EDIT MODE -->
			    <select th:id="'assignee-edit-' + ${task.id}"
			            class="form-select form-select-sm d-none"
			            th:onchange="'updateAssignee(' + ${task.id} + ', this.value)'">

			      <option value="">Unassigned</option>

			      <option th:each="user : ${projectUsers}"
			              th:value="${user.userId}"
			              th:text="${user.name}"
			              th:selected="${task.assignee != null and task.assignee.id == user.userId}">
			      </option>

			    </select>

			  </td>
			  
		      <!--<td th:text="${task.dueDate}"></td>-->
			  <td>

			    <!-- VIEW MODE -->
			    <span th:id="'status-view-' + ${task.id}"
			          th:classappend="${task.status == 'COMPLETED'} ? 'badge bg-success' :
			                          (${task.status == 'IN_PROGRESS'} ? 'badge bg-primary' :
			                          'badge bg-secondary')"
			          th:text="${task.status}"
			          style="cursor:pointer;"
			          th:onclick="'enableStatusEdit(' + ${task.id} + ')'">
			    </span>

			    <!-- EDIT MODE -->
			    <select th:id="'status-edit-' + ${task.id}"
			            class="form-select form-select-sm d-none"
			            th:onchange="'updateTaskStatus(' + ${task.id} + ', this.value)'">

			      <option value="PENDING"
			              th:selected="${task.status == 'PENDING'}">Pending</option>

			      <option value="IN_PROGRESS"
			              th:selected="${task.status == 'IN_PROGRESS'}">In Progress</option>

			      <option value="COMPLETED"
			              th:selected="${task.status == 'COMPLETED'}">Completed</option>

			    </select>

			  </td>
		      <td th:text="${task.taskType}"></td>
		      <td>
		        <button class="btn btn-sm btn-primary"
		                th:onclick="openEditModal([[${task.id}]])">
		          <i class="bi bi-pencil"></i>
		        </button>
		      </td>
		    </tr>
		  </tbody>
		</table>


    </main>
	<div id="createPanel"
	     class="col-lg-4 border-start bg-white d-none"
	     style="min-height:100vh;">

	  <div class="p-4">

	    <div class="d-flex justify-content-between align-items-center mb-4">
	      <h5 id="drawerTitle" class="fw-semibold mb-0">Create Task</h5>
	      <button class="btn-close"
	              onclick="closeCreatePanel()">
	      </button>
	    </div>

		<form id="taskForm" th:action="@{/projects/{projectId}/tasks/save(projectId=${project.id})}"
		      method="post"
		      th:object="${newTask}">
			  <input type="hidden" id="taskIdField" name="id">
		  <!-- Task Type -->
		  <div class="mb-3">
		    <label class="form-label fw-semibold">Task Type</label>
		    <select class="form-select"
		            th:field="*{taskType}"
		            required>
		      <option value="">Select Type</option>
		      <option value="EPIC">Epic</option>
		      <option value="STORY">Story</option>
		      <option value="TASK">Task</option>
		      <option value="SUB_TASK">Sub-task</option>
		    </select>
		  </div>

		  <!-- Parent -->
		  <div class="mb-3">
		    <label class="form-label fw-semibold">Parent Task</label>
		    <select class="form-select"
		            name="parentTaskId">
		      <option value="">No Parent</option>
		      <option th:each="task : ${taskList}"
		              th:value="${task.id}"
		              th:text="${task.title}">
		      </option>
		    </select>
		  </div>

		  <!-- Title -->
		  <div class="mb-3">
		    <label class="form-label fw-semibold">Title</label>
		    <input type="text"
		           class="form-control"
		           th:field="*{title}"
		           required>
		  </div>

		  <!-- Description -->
		  <div class="mb-3">
		    <label class="form-label fw-semibold">Description</label>
		    <textarea class="form-control"
		              rows="3"
		              th:field="*{description}">
		    </textarea>
		  </div>

		  <div class="row">
		    <div class="col-md-6 mb-3">
		      <label class="form-label fw-semibold">Priority</label>
		      <select class="form-select"
		              th:field="*{priority}">
		        <option value="">Select Priority</option>
		        <option value="HIGH">High</option>
		        <option value="MEDIUM">Medium</option>
		        <option value="LOW">Low</option>
		      </select>
		    </div>

		    <div class="col-md-6 mb-3">
		      <label class="form-label fw-semibold">Status</label>
		      <select class="form-select"
		              th:field="*{status}">
		        <option value="PENDING">Pending</option>
		        <option value="IN_PROGRESS">In Progress</option>
		        <option value="COMPLETED">Completed</option>
		      </select>
		    </div>
		  </div>

		  <div class="row">
		    <div class="col-md-6 mb-3">
		      <label class="form-label fw-semibold">Start Date</label>
		      <input type="date"
		             class="form-control"
		             th:field="*{startDate}">
		    </div>

		    <div class="col-md-6 mb-3">
		      <label class="form-label fw-semibold">Due Date</label>
		      <input type="date"
		             class="form-control"
		             th:field="*{dueDate}">
		    </div>
		  </div>

		  <div class="mb-3">
		    <label class="form-label fw-semibold">Original Estimate</label>
		    <input type="text"
		           class="form-control"
		           name="estimateInput"
		           placeholder="e.g. 2h 30m">
		  </div>

		  <div class="mb-3">
		    <label class="form-label fw-semibold">Assignee</label>
		    <select class="form-select"
		            th:field="*{assignee.id}">
		      <option value="">Select Assignee</option>
		      <option th:each="user : ${projectUsers}"
		              th:value="${user.userId}"
		              th:text="${user.name}">
		      </option>
		    </select>
		  </div>

		  <div class="d-flex justify-content-end gap-2 mt-4">
		    <button type="button"
		            class="btn btn-outline-secondary"
		            onclick="closeCreatePanel()">
		      Cancel
		    </button>
		    <button type="submit"
		            class="btn btn-success" id="drawerSubmitBtn">
		      Create
		    </button>
		  </div>

		</form>


	  </div>
	</div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/authFetch.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
	$(document).ready(function () {
		$('.task-table').DataTable({
			paging: false,        // ❌ Remove pagination
			info: false,          // ❌ Remove "Showing X of Y"
			lengthChange: false,  // ❌ Remove entries dropdown
			ordering: false,      // ❌ Remove column sorting
			searching: true,      // ✅ Keep search
			dom: 'f'              // ✅ Only show filter (search box)
		});
	});
</script>
<script>
	let activeStatusEditor = null;
	let activeAssigneeEditor = null;
	let activeTitleEditor = null;

	const taskTypeSelect = document.querySelector('[name="taskType"]');
	const parentSelect = document.getElementById('parentTaskSelect');

	taskTypeSelect.addEventListener('change', () => {
		if (taskTypeSelect.value === 'SUB_TASK') {
			parentSelect.required = true;
		} else {
			parentSelect.required = false;
			parentSelect.value = '';
		}
	});
	
	function openCreatePanel() {
		const panel = document.getElementById("createPanel");
		const main = document.getElementById("mainContent");

		panel.classList.remove("d-none");
		main.classList.remove("col-lg-10");
		main.classList.add("col-lg-6");

		// Reset form to CREATE mode
		document.getElementById("drawerTitle").innerText = "Create Task";
		document.getElementById("taskForm")
			.action = `/task/save`;
		document.getElementById("drawerSubmitBtn")
			.innerText = "Create";

		document.getElementById("taskForm").reset();
		document.getElementById("taskIdField").value = "";
	}

	function closeCreatePanel() {
		const panel = document.getElementById("createPanel");
		const main = document.getElementById("mainContent");

		panel.classList.add("d-none");

		main.classList.remove("col-lg-6");
		main.classList.add("col-lg-10");
	}
	
	function enableStatusEdit(taskId) {

		// Close previous if open
		if (activeStatusEditor && activeStatusEditor !== taskId) {
			closeStatusEdit(activeStatusEditor);
		}

		activeStatusEditor = taskId;

		document.getElementById("status-view-" + taskId)
			.classList.add("d-none");

		const select = document.getElementById("status-edit-" + taskId);
		select.classList.remove("d-none");
		select.focus();
	}

	function closeStatusEdit(taskId) {

		const view = document.getElementById("status-view-" + taskId);
		const select = document.getElementById("status-edit-" + taskId);

		if (!view || !select) return;

		select.classList.add("d-none");
		view.classList.remove("d-none");

		activeStatusEditor = null;
	}
	
	function formatStatus(status) {
		if (status === "IN_PROGRESS") return "In Progress";
		if (status === "PENDING") return "Pending";
		if (status === "COMPLETED") return "Completed";
		return status;
	}

	document.addEventListener("click", function (event) {
		if (!activeStatusEditor) return;

		const view = document.getElementById("status-view-" + activeStatusEditor);
		const select = document.getElementById("status-edit-" + activeStatusEditor);

		if (!select || !view) return;

		// If click is NOT inside select or badge
		if (!select.contains(event.target) &&
			!view.contains(event.target)) {

			closeStatusEdit(activeStatusEditor);
		}
	});
	

		function enableAssigneeEdit(taskId) {

			// Close previously open editor
			if (activeAssigneeEditor && activeAssigneeEditor !== taskId) {
				closeAssigneeEdit(activeAssigneeEditor);
			}

			activeAssigneeEditor = taskId;

			document.getElementById("assignee-view-" + taskId)
				.classList.add("d-none");

			const select = document.getElementById("assignee-edit-" + taskId);
			select.classList.remove("d-none");
			select.focus();
		}

		function closeAssigneeEdit(taskId) {

			const view = document.getElementById("assignee-view-" + taskId);
			const select = document.getElementById("assignee-edit-" + taskId);

			if (!view || !select) return;

			select.classList.add("d-none");
			view.classList.remove("d-none");

			activeAssigneeEditor = null;
		}

		document.addEventListener("click", function (event) {

			if (!activeAssigneeEditor) return;

			const view = document.getElementById("assignee-view-" + activeAssigneeEditor);
			const select = document.getElementById("assignee-edit-" + activeAssigneeEditor);

			if (!view || !select) return;

			if (!select.contains(event.target) &&
				!view.contains(event.target)) {

				closeAssigneeEdit(activeAssigneeEditor);
			}
		});
		
		function enableTitleEdit(taskId) {

			if (activeTitleEditor && activeTitleEditor !== taskId) {
				closeTitleEdit(activeTitleEditor);
			}

			activeTitleEditor = taskId;

			const view = document.getElementById("title-view-" + taskId);
			const input = document.getElementById("title-edit-" + taskId);

			view.classList.add("d-none");
			input.classList.remove("d-none");

			input.focus();
			input.select();
		}

		function closeTitleEdit(taskId) {

			const view = document.getElementById("title-view-" + taskId);
			const input = document.getElementById("title-edit-" + taskId);

			if (!view || !input) return;

			input.classList.add("d-none");
			view.classList.remove("d-none");

			activeTitleEditor = null;
		}
		function handleTitleKey(event, taskId) {

			if (event.key === "Enter") {
				updateTitle(taskId);
			}

			if (event.key === "Escape") {
				closeTitleEdit(taskId);
			}

		}

</script>
<script th:inline="javascript">
	var projectId = /*[[${project.id}]]*/ 0;
	function openEditModal(taskId) {

		fetch(`/projects/${projectId}/tasks/${taskId}`)
			.then(res => res.json())
			.then(task => {

				// Open panel
				openCreatePanel();

				// Change title
				document.getElementById("drawerTitle").innerText = "Edit Task";

				// Change form action
				document.getElementById("taskForm")
					.action = `/task/update`;

				// Change button text
				document.getElementById("drawerSubmitBtn")
					.innerText = "Update";

				// Fill fields
				document.getElementById("taskIdField").value = task.id;
				document.querySelector('[name="title"]').value = task.title;
				document.querySelector('[name="description"]').value = task.description || '';
				document.querySelector('[name="priority"]').value = task.priority || '';
				document.querySelector('[name="status"]').value = task.status || '';
				document.querySelector('[name="startDate"]').value = task.startDate || '';
				document.querySelector('[name="dueDate"]').value = task.dueDate || '';
				document.querySelector('[name="taskType"]').value = task.taskType || '';
				document.querySelector('[name="parentTaskId"]').value =
					task.parentTask ? task.parentTask.id : '';
				document.querySelector('[name="assignee.id"]').value =
					task.assigneeId ? task.assigneeId : '';
				document.querySelector('[name="estimateInput"]').value =
					task.estimateFormatted || '';
			});
	}

	function updateTaskStatus(taskId, newStatus) {

		fetch(`/task/${taskId}/status`, {
			method: "PATCH",
			headers: {"Content-Type": "application/json"},
			body: JSON.stringify({status: newStatus})
		})
			.then(response => {
				if (response.ok) {

					const view = document.getElementById("status-view-" + taskId);
					const select = document.getElementById("status-edit-" + taskId);

					view.innerText = formatStatus(newStatus);

					view.classList.remove("bg-success", "bg-primary", "bg-secondary");

					if (newStatus === "COMPLETED") {
						view.classList.add("badge", "bg-success");
					} else if (newStatus === "IN_PROGRESS") {
						view.classList.add("badge", "bg-primary");
					} else {
						view.classList.add("badge", "bg-secondary");
					}

					select.classList.add("d-none");
					view.classList.remove("d-none");

				} else {
					alert("Failed to update status");
				}
			});
	}

	function updateAssignee(taskId, userId) {

		fetch(`/task/${taskId}/assignee`, {
			method: "PATCH",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				assigneeId: userId
			})
		})
			.then(res => {
				if (res.ok) {
					location.reload();
				} else {
					alert("Failed to update assignee");
				}
			});
	}

	function updateTitle(taskId) {

		const input = document.getElementById("title-edit-" + taskId);
		const newTitle = input.value;

		fetch(`/task/${taskId}/title`, {
			method: "PATCH",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				title: newTitle
			})
		})
			.then(res => {
				if (res.ok) {

					const view = document.getElementById("title-view-" + taskId);
					view.innerText = newTitle;

					closeTitleEdit(taskId);

				} else {
					alert("Failed to update title");
				}
			});
	}
</script>
</body>
</html>
